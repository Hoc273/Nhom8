<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bai tap tuong tac - Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                500: "#2563eb",
                600: "#1d4ed8",
                700: "#1e40af",
              },
            },
            boxShadow: {
              card: "0 10px 25px -10px rgba(37, 99, 235, 0.25)",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-b from-slate-100 to-blue-50 text-slate-800"
  >
    <main class="mx-auto max-w-5xl px-4 py-10">
      <section class="rounded-2xl border border-blue-100 bg-white shadow-card">
        <header class="rounded-t-2xl bg-brand-600 px-4 py-3 text-white">
          <div class="flex items-center justify-between">
            <h1 class="text-base font-semibold tracking-wide">MySite</h1>

            <button
              type="button"
              aria-label="Mo menu"
              class="inline-flex items-center justify-center rounded-md p-2 transition hover:bg-white/20 md:hidden"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="h-5 w-5"
              >
                <path
                  fill-rule="evenodd"
                  d="M3 5.25A.75.75 0 0 1 3.75 4.5h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 5.25Zm0 6A.75.75 0 0 1 3.75 10.5h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Zm0 6a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>

            <nav class="hidden items-center gap-6 text-sm font-medium md:flex">
              <a href="#" class="transition hover:text-blue-100">Home</a>
              <a href="#" class="transition hover:text-blue-100">About</a>
              <a href="#" class="transition hover:text-blue-100">Contact</a>
            </nav>
          </div>
        </header>

        <div
          class="flex flex-col items-center gap-8 px-6 py-12 md:flex-row md:justify-center md:gap-14 md:px-10"
        >
          <div
            class="flex h-40 w-40 items-center justify-center rounded-xl bg-brand-50 ring-1 ring-blue-100 md:h-48 md:w-48"
          >
            <svg
              viewBox="0 0 80 50"
              class="h-16 w-24 text-cyan-500"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M4 33c6-11 20-17 34-14 9 2 17 7 22 14-6-4-13-6-20-6-9 0-17 3-23 8-4 3-9 2-13-2Zm72-16c-6 11-20 17-34 14-9-2-17-7-22-14 6 4 13 6 20 6 9 0 17-3 23-8 4-3 9-2 13 2Z"
              />
            </svg>
          </div>

          <div class="text-center md:max-w-sm md:text-left">
            <h2 class="text-3xl font-bold leading-tight text-slate-900">
              Tailwind CSS
            </h2>
            <h3 class="mt-4 text-xl font-semibold text-slate-900">
              Learn Tailwind CSS
            </h3>
            <p class="mt-2 text-sm text-slate-600">
              Build responsive layouts quickly with utility-first CSS.
            </p>
            <button
              type="button"
              class="mt-5 inline-flex rounded-md bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2"
            >
              Get Started
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
